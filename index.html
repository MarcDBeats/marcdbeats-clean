  <script>
    console.log('=== MARCDBEATS STARTING ===');
    
    // =============================================================
    // AIRTABLE LOADER
    // =============================================================
    console.log('Airtable manual loader initializing...');
    window.Airtable = function(config) {
      return {
        base: function(baseId) {
          return {
            table: function(tableName) {
              return {
                select: function(options) {
                  return {
                    all: function() {
                      let url = `https://api.airtable.com/v0/${baseId}/${tableName}?maxRecords=100`;
                      if (options && options.sort) {
                        options.sort.forEach((sort, i) => {
                          url += `&sort[${i}][field]=${sort.field}&sort[${i}][direction]=${sort.direction || 'asc'}`;
                        });
                      }
                      return fetch(url, {
                        headers: { 'Authorization': `Bearer ${config.apiKey}` }
                      })
                      .then(res => {
                        if (!res.ok) throw new Error(`Airtable API error: ${res.status}`);
                        return res.json();
                      })
                      .then(data => data.records);
                    }
                  };
                }
              };
            }
          };
        }
      };
    };
    console.log('Airtable manual loader ready');

    // =============================================================
    // 📦 AIRTABLE CONFIG
    // =============================================================
   const AIRTABLE_API_KEY = 'patBKZiLmkE0gKJUw.900d727f261dba00b44ed7196327030a6efd35250f6e8a7c5c8b02df5bb63cef';
    const AIRTABLE_BASE_ID = 'appygG2TL3no2ivmU';
    const AIRTABLE_TABLE_NAME = 'Beats';

    // =============================================================
    // 📦 SUPABASE CONFIG
    // =============================================================
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';

    // THIS IS THE ONLY supabase VARIABLE IN THE ENTIRE FILE
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =============================================================
    // 📦 STATE
    // =============================================================
    const state = {
      currentIndex: 0,
      currentBeat: null,
      isPlaying: false,
      user: null,
      likes: [],
      purchases: [],
      cart: [],
      isGuest: true,
      onboardingShown: false,
      beats: [],
      playlists: [],
      singles: [],
      featured: [],

    // =============================================================
    // 🛠️ HELPERS
    // =============================================================
    
      function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }
    
    function showToast(msg, icon = 'fa-info-circle') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      document.getElementById('toastMsg').textContent = msg;
      toast.querySelector('i').className = `fas ${icon}`;
      toast.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function isLiked(beatId) { return state.likes.includes(beatId); }
    function isLoggedIn() { return state.user !== null; }
    function formatPrice(price) { return `$${price.toFixed(2)}`; }
    function formatViews(views) {
      if (views >= 1000000) return `${(views / 1000000).toFixed(1)}M`;
      if (views >= 1000) return `${(views / 1000).toFixed(0)}K`;
      return views.toString();
    }
      function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return mins + ':' + (secs < 10 ? '0' : '') + secs;
  }
    function getBeat(id) { return state.beats.find(b => b.id === id); }
    function getPlaylistBeats(playlistId) {
      const playlist = state.playlists.find(p => p.id === playlistId);
      if (!playlist) return [];
      return playlist.beats;
    }
    function getSingles() { return state.singles; }
    function getAllBeats() { return state.beats; }
    function getPlaylist(id) { return state.playlists.find(p => p.id === id); }
    function getAllPlaylists() { return state.playlists; }
    function hasVideo(beat) { return beat.video && beat.video.length > 0; }
    function getBeatMedia(beat) {
      if (hasVideo(beat)) return beat.video;
      if (beat.artwork) return beat.artwork;
      return '/assets/artwork/default-cover.jpg';
    }
    function getPlaylistCover(playlist) {
      if (playlist.cover) return playlist.cover;
      const firstBeat = playlist.beats[0];
      return firstBeat?.artwork || '/assets/artwork/default-cover.jpg';
    }

    

    // =============================================================
    // 🔐 AUTH FUNCTIONS
    // =============================================================
    async function signUp(email, password) {
      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        state.user = data.user;
        state.isGuest = false;
        await loadUserData();
        updateUI();
        showToast('Account created! Welcome.', 'fa-user-check');
        return true;
      } catch (error) {
        showToast(error.message, 'fa-exclamation-circle');
        return false;
      }
    }

    async function signIn(email, password) {
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        state.user = data.user;
        state.isGuest = false;
        await loadUserData();
        updateUI();
        showToast('Welcome back!', 'fa-user-check');
        return true;
      } catch (error) {
        showToast(error.message, 'fa-exclamation-circle');
        return false;
      }
    }

    async function signOut() {
      try {
        await supabase.auth.signOut();
        state.user = null;
        state.isGuest = true;
        state.likes = [];
        state.purchases = [];
        updateUI();
        showToast('Signed out', 'fa-sign-out-alt');
        closeAllViews();
      } catch (error) {
        showToast(error.message, 'fa-exclamation-circle');
      }
    }

    // =============================================================
    // 💾 USER DATA
    // =============================================================
    async function loadUserData() {
      if (!state.user) return;
      try {
        const { data: likesData, error: likesError } = await supabase
          .from('likes')
          .select('beat_id')
          .eq('member_id', state.user.id);
        if (!likesError) state.likes = likesData.map(l => l.beat_id);

        const { data: purchasesData, error: purchasesError } = await supabase
          .from('purchases')
          .select('*')
          .eq('member_id', state.user.id);
        if (!purchasesError) state.purchases = purchasesData;

        updateUI();
      } catch (error) {
        console.warn('Could not load user data:', error);
      }
    }

    async function toggleLike(beatId) {
      if (!isLoggedIn()) {
        showToast('Please sign in to like beats', 'fa-sign-in-alt');
        return;
      }
      const isLikedNow = isLiked(beatId);
      try {
        if (isLikedNow) {
          const { error } = await supabase
            .from('likes')
            .delete()
            .eq('member_id', state.user.id)
            .eq('beat_id', beatId);
          if (!error) {
            state.likes = state.likes.filter(id => id !== beatId);
            showToast('Removed like', 'fa-heart-broken');
          }
        } else {
          const { error } = await supabase
            .from('likes')
            .insert({ member_id: state.user.id, beat_id: beatId });
          if (!error) {
            state.likes.push(beatId);
            const likeBtn = document.getElementById('likeBtn');
            if (likeBtn) {
              likeBtn.classList.add('like-animation');
              setTimeout(() => likeBtn.classList.remove('like-animation'), 500);
            }
            showToast('Liked!', 'fa-heart');
          }
        }
        updateUI();
      } catch (error) {
        showToast(error.message, 'fa-exclamation-circle');
      }
    }

    // =============================================================
    // 🛒 CART FUNCTIONS
    // =============================================================
    function addToCart(beatId) {
      const beat = getBeat(beatId);
      if (!beat) return;
      if (state.cart.find(b => b.id === beatId)) {
        showToast('Already in cart', 'fa-exclamation-circle');
        return;
      }
      state.cart.push(beat);
      updateCartBadge();
      showToast(`Added "${beat.title}" to cart`, 'fa-shopping-cart');
    }

    function removeFromCart(beatId) {
      state.cart = state.cart.filter(b => b.id !== beatId);
      updateCartBadge();
      renderCartModal();
    }

    function updateCartBadge() {
      const badge = document.getElementById('cartBadge');
      if (badge) {
        badge.textContent = state.cart.length;
        badge.style.display = state.cart.length > 0 ? 'flex' : 'none';
      }
    }

    // =============================================================
    // 📦 LOAD DATA FROM AIRTABLE
    // =============================================================
    async function loadBeatData() {
      try {
        let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}?maxRecords=100`;
        console.log('Fetching from Airtable:', url);

        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${AIRTABLE_API_KEY}` }
        });

        if (!response.ok) {
          throw new Error(`Airtable API error: ${response.status} - ${response.statusText}`);
        }

        const data = await response.json();
        console.log('Airtable response:', data);

        if (!data.records || data.records.length === 0) {
          console.warn('No records found in Airtable');
          state.beats = [];
          state.loaded = true;
          renderDiscover(0);
          renderFeatured();
          renderPlaylists();
          renderSingles();
          updateUI();
          showToast('No beats found in Airtable', 'fa-exclamation-circle');
          return;
        }

        state.beats = data.records.map(record => ({
          id: parseInt(record.id, 36),
          title: record.fields['Beat Name'] || 'Untitled',
          artist: record.fields['Artist'] || 'Unknown',
          genre: record.fields['Genre'] || '',
          price: record.fields['Price'] || 0,
          bpm: record.fields['BPM'] || '',
          artwork: record.fields['Artwork'] || 'https://via.placeholder.com/400x400/DC2626/FFFFFF?text=BEAT',
          video: record.fields['Video'] || '',
          mp3: record.fields['MP3'] || '',
          views: 0,
          socialLikes: 0,
          tags: record.fields['Tags'] || [],
          duration: '',
          releaseDate: '',
          playlist: record.fields['Playlist'] || '',
          isSingle: record.fields['Is Single'] || false,
          trackNumber: record.fields['Track Number'] || 999,
          featured: record.fields['Featured'] || false,
          tikTok: record.fields['Tik Tok'] || '',
          instagram: record.fields['Instagram'] || '',
          searchKeywords: `${record.fields['Beat name'] || ''} ${record.fields['Artist'] || ''} ${record.fields['Genre'] || ''} ${record.fields['Tik Tok'] || ''} ${record.fields['Instagram'] || ''}`
        }));

                // Shuffle beats for random order
        state.beats = shuffleArray(state.beats);
        state.featured = state.beats.filter(b => b.featured === true);
        state.singles = state.beats.filter(beat => beat.isSingle === true);

        const playlistIds = [...new Set(state.beats.map(b => b.playlist).filter(Boolean))];
        state.playlists = playlistIds.map(id => ({
          id: id,
          name: id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
          beats: state.beats.filter(b => b.playlist === id).sort((a, b) => a.trackNumber - b.trackNumber)
        }));

        state.loaded = true;

        renderDiscover(0);
        renderFeatured();
        renderPlaylists();
        renderSingles();
        updateUI();

        console.log(`Loaded ${state.beats.length} beats from Airtable`);
        console.log(`${state.playlists.length} playlists`);
        console.log(`${state.singles.length} singles`);
        console.log(`${state.featured.length} featured`);
        showToast(`Loaded ${state.beats.length} beats!`, 'fa-check-circle');
      } catch (error) {
        console.error('Failed to load data from Airtable:', error);
        showToast('Failed to load beats: ' + error.message, 'fa-exclamation-circle');
        state.loaded = true;
      }
    }

    // =============================================================
    // 🔍 SEARCH
    // =============================================================
    function searchBeats(query) {
      if (!query || query.trim().length < 2) {
        renderDiscover(0);
        return;
      }
      const q = query.toLowerCase().trim();
      const results = state.beats.filter(beat =>
        beat.title.toLowerCase().includes(q) ||
        beat.artist.toLowerCase().includes(q) ||
        beat.genre.toLowerCase().includes(q) ||
        beat.searchKeywords.toLowerCase().includes(q)
      );
      if (results.length === 0) {
        showToast('No beats found', 'fa-search');
        return;
      }
      const container = document.getElementById('exploreBeatDisplay');
      if (!container) return;
      container.querySelectorAll('.swipe-card').forEach(c => c.remove());
      const beat = results[0];
      state.currentBeat = beat;
      renderCard(beat, 0, results);
    }

    // =============================================================
    // 🎬 RENDER CARD (Simplified for testing)
    // =============================================================

    const hasArtwork = beat.artwork && beat.artwork.length > 0;

  mediaHTML = `<video id="exploreVideo" src="${beat.video}" muted loop playsinline controlslist="nodownload nofullscreen noremoteplayback" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;z-index:10;background:#000;"></video>`;
} else if (hasArtwork) {

        </div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);pointer-events:none;"></div>
        <div style="position:absolute;bottom:20px;left:20px;right:20px;z-index:2;pointer-events:none;">
          <h2 style="font-size:22px;font-weight:700;margin-bottom:2px;text-shadow:0 2px 10px rgba(0,0,0,0.5);pointer-events:auto;">${beat.title}</h2>
          <p style="color:var(--text-secondary);font-size:15px;margin-bottom:2px;text-shadow:0 2px 10px rgba(0,0,0,0.5);pointer-events:auto;">${beat.artist}</p>
          <p style="color:var(--text-muted);font-size:13px;text-shadow:0 2px 10px rgba(0,0,0,0.5);pointer-events:auto;">${beat.genre}</p>
        </div>
      </div>
    `;
    
    state.playerQueue = queue || state.beats;
    state.currentIndex = index;
    state.currentBeat = beat;
    state.currentBeat.video = beat.video;
    console.log('renderCard - currentBeat set to:', state.currentBeat);  // DEBUG
    // Fallback: if video is missing, check if it's in the beat object
    if (!state.currentBeat.video && beat.video) {
      state.currentBeat.video = beat.video;
    }
    updatePlayer(beat);

    // AUTO-PLAY AUDIO AND VIDEO WHEN BEAT CHANGES
    const audio = document.getElementById('audioPlayer');
    if (audio && beat.mp3) {
        audio.play()
            .then(() => {
                state.isPlaying = true;
                document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
            })
            .catch(err => console.log('Audio autoplay blocked:', err));
    }

       // Force video to play (muted) - FINAL FIX
    setTimeout(() => {
      const videoEl = document.getElementById('exploreVideo');
      if (videoEl) {
        videoEl.muted = true;
        videoEl.play().then(() => {
          console.log('✅ Video playing successfully');
        }).catch(e => {
          console.log('❌ Video play failed:', e);
          // If autoplay is blocked, try with user gesture
          videoEl.controls = true;
          videoEl.style.cursor = 'pointer';
          videoEl.addEventListener('click', function() {
            this.play();
          });
        });
      }
    }, 300);

                  // Force video to load and play
    setTimeout(() => {
      const video = document.getElementById('exploreVideo');
      if (video) {
        // Set the src again to ensure it's loaded
        video.src = state.currentBeat.video || beat.video;
        video.load();
        video.play().then(() => {
          console.log('Video playing successfully');
        }).catch(e => {
          console.log('Video autoplay blocked:', e);
          // Show a play button overlay if autoplay fails
          video.controls = true;
        });
      } else {
        console.log('Video element not found');
      }
    }, 500);
    
  }
  // =============================================================
  // 🔄 NAVIGATION FUNCTIONS
  // =============================================================
  function prevBeat() {
    let prevIndex = state.currentIndex - 1;
    if (prevIndex < 0) {
      prevIndex = state.beats.length - 1;
    }
    const beat = state.beats[prevIndex];
    console.log('prevBeat - playing beat:', beat);
    renderCard(beat, prevIndex, state.beats);
    
    setTimeout(() => {
      const audio = document.getElementById('audioPlayer');
      if (audio && beat.mp3) {
        audio.play().catch(e => console.log('Playback failed:', e));
        state.isPlaying = true;
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
      }
    }, 300);
    
    setTimeout(() => {
      const video = document.getElementById('exploreVideo');
      if (video && beat.video) {
        video.src = beat.video;
        video.load();
        video.play().catch(e => console.log('Video play failed:', e));
      }
    }, 400);
  }

  function nextBeat() {
    let nextIndex = state.currentIndex + 1;
    if (nextIndex >= state.beats.length) {
      nextIndex = 0;
    }
    const beat = state.beats[nextIndex];
    console.log('nextBeat - playing beat:', beat);
    renderCard(beat, nextIndex, state.beats);
    
    setTimeout(() => {
      const audio = document.getElementById('audioPlayer');
      if (audio && beat.mp3) {
        audio.play().catch(e => console.log('Playback failed:', e));
        state.isPlaying = true;
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
      }
    }, 300);
    
    setTimeout(() => {
      const video = document.getElementById('exploreVideo');
      if (video && beat.video) {
        video.src = beat.video;
        video.load();
        video.play().catch(e => console.log('Video play failed:', e));
      }
    }, 400);
  }
    
      // =============================================================
  // 🔄 RENDER DISCOVER (Explore Tab)
  // =============================================================
  function renderDiscover(index) {
    const beats = state.beats;
    const container = document.getElementById('exploreBeatDisplay');
    if (!container) return;
    
    if (beats.length === 0) {
      container.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);padding:40px;text-align:center;">
          <i class="fas fa-music" style="font-size:48px;color:#2a2a3a;margin-bottom:12px;"></i>
          <h3>No beats found</h3>
          <p>Add beats to your Airtable to get started.</p>
        </div>
      `;
      return;
    }
    
    if (index >= beats.length) index = 0;
    if (index < 0) index = beats.length - 1;
    renderCard(beats[index], index, beats);
  }
    // =============================================================
    // 🎵 PLAYER
    // =============================================================
        function updatePlayer(beat) {
      if (!beat) return;
      
      // Update title and artist
      const titleEl = document.getElementById('playerTitle');
      const artistEl = document.getElementById('playerArtist');
      if (titleEl) titleEl.textContent = beat.title;
      if (artistEl) artistEl.textContent = beat.artist;
      
      // Update artwork
      const artwork = document.getElementById('playerArtwork');
      if (artwork) {
        const hasVideoFile = hasVideo(beat);
        if (hasVideoFile) {
         artwork.innerHTML = `<video src="${beat.video}" muted loop playsinline controlslist="nodownload nofullscreen noremoteplayback" style="pointer-events:none;"></video>`;
        } else if (beat.artwork) {
          artwork.innerHTML = `<img src="${beat.artwork}" alt="${beat.title}" />`;
        } else {
          artwork.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;background:#1a1a2e;"><i class="fas fa-music"></i></div>`;
        }
      }
      
      // Load the audio (but don't play it)
      const audio = document.getElementById('audioPlayer');
      if (audio && beat.mp3) {
        audio.src = beat.mp3;
        audio.load();
      }
      
      // Update like button
      const liked = isLiked(beat.id);
      const likeBtn = document.getElementById('playerLike');
      if (likeBtn) {
        likeBtn.classList.toggle('liked', liked);
      }
    }
      // Update progress bar
  const audio = document.getElementById('audioPlayer');
  const progressSlider = document.getElementById('progressSlider');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeTotal = document.getElementById('timeTotal');
  
  if (audio && progressSlider) {
    audio.addEventListener('timeupdate', function() {
      if (!isNaN(audio.duration)) {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressSlider.value = progress;
        timeCurrent.textContent = formatTime(audio.currentTime);
        timeTotal.textContent = formatTime(audio.duration);
      }
    });
    
    progressSlider.addEventListener('input', function() {
      const seekTime = (this.value / 100) * audio.duration;
      audio.currentTime = seekTime;
    });
  }

    // =============================================================
    // 🛒 CART MODAL (Simplified)
    // =============================================================

            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:13px;color:var(--text-muted);">$</span>
              <input type="number" class="cart-price-input" data-beat-id="${beat.id}" value="1" min="1" step="0.50" style="width:70px;padding:6px 8px;border-radius:8px;border:1px solid var(--border-subtle);background:rgba(255,255,255,0.05);color:var(--text-primary);text-align:center;" />
              <button class="cart-item-remove" data-beat-id="${beat.id}" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 6px;">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('')}
      <div style="padding:12px 0;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span style="font-weight:600;">Total</span>
        <span style="font-weight:700;color:var(--accent);font-size:20px;" id="cartTotal">$0.00</span>
      </div>
      <button class="btn-primary" id="checkoutCart" style="margin-top:12px;">
        <i class="fas fa-arrow-up"></i> Checkout
      </button>
      <button class="btn-secondary" id="closeCart">Continue Browsing</button>
    `;

    // Update total when prices change
    function updateCartTotal() {
      const inputs = document.querySelectorAll('.cart-price-input');
      let total = 0;
      inputs.forEach(input => {
        const val = parseFloat(input.value) || 0;
        if (val >= 1) total += val;
      });
      document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
    }

    // Remove item from cart
    document.querySelectorAll('.cart-item-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        const beatId = parseInt(btn.dataset.beatId);
        removeFromCart(beatId);
      });
    });

    // Listen for price changes
    document.querySelectorAll('.cart-price-input').forEach(input => {
      input.addEventListener('input', updateCartTotal);
      input.addEventListener('change', function() {
        if (parseFloat(this.value) < 1) this.value = 1;
        updateCartTotal();
      });
    });

    // Checkout button
    document.getElementById('checkoutCart')?.addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('active');
      showCartCheckout();
    });

    document.getElementById('closeCart')?.addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('active');
    });

    document.getElementById('modalOverlay').classList.add('active');
    updateCartTotal();
  }

    if (playlists.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);text-align:center;">

        <p>Add playlists to your Airtable.</p>
      </div>`;
      return;
    }

    grid.innerHTML = playlists.map(playlist => {
      const beats = playlist.beats;
      const cover = getPlaylistCover(playlist);
      return `
        <div class="playlist-card" data-playlist-id="${playlist.id}">
          <div class="cover"><img src="${cover}" alt="${playlist.name}" /></div>

  // =============================================================

  // =============================================================
  function showPlaylistDetail(playlistId) {
    const playlist = getPlaylist(playlistId);
    if (!playlist) return;

    const beats = playlist.beats;
    document.getElementById('detailTitle').textContent = playlist.name;
    document.getElementById('detailCount').textContent = `${beats.length} beats`;

    const tracklist = document.getElementById('detailTracklist');
    if (!tracklist) return;

    tracklist.innerHTML = beats.map((beat, i) => `
      <div class="track-item" data-beat-id="${beat.id}" id="track-${beat.id}">
        <div class="track-number">${i + 1}</div>
        <div class="track-info">
          <div class="title">${beat.title}</div>
          <div class="artist">${beat.artist} · ${beat.genre}</div>
        </div>
        <div class="track-actions">
          <button class="like-btn-track ${isLiked(beat.id) ? 'liked' : ''}" data-beat-id="${beat.id}">
            <i class="fas fa-heart"></i>
          </button>
          <button class="cart-btn-track" data-beat-id="${beat.id}">
            <i class="fas fa-shopping-cart"></i>
          </button>
          <button class="buy-btn-track" data-beat-id="${beat.id}" style="background:rgba(255,255,255,0.06);color:var(--text-secondary);padding:2px 12px;border-radius:12px;font-size:11px;font-weight:600;border:none;cursor:pointer;">
  PWYW
</button>
        </div>
      </div>
    `).join('');

    // Click on track → play it in Discover
    tracklist.querySelectorAll('.track-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        const beatId = parseInt(item.dataset.beatId);
        const beat = getBeat(beatId);
        if (beat) {
          closeAllViews();
          switchTab('discover');
          renderDiscover(state.beats.indexOf(beat));
        }
      });
    });

    // Like buttons in tracklist
    tracklist.querySelectorAll('.like-btn-track').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const beatId = parseInt(btn.dataset.beatId);
        toggleLike(beatId);
        btn.classList.toggle('liked');
        updateUI();
      });
    });

    // Cart buttons in tracklist
    tracklist.querySelectorAll('.cart-btn-track').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const beatId = parseInt(btn.dataset.beatId);
        addToCart(beatId);
      });
    });

    // Buy buttons in tracklist
    tracklist.querySelectorAll('.buy-btn-track').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const beatId = parseInt(btn.dataset.beatId);
        handleBuy(beatId);
      });
    });

    // Show the detail view
    document.getElementById('playlistDetail').classList.add('active');
  }

  function renderPortal() {
    const content = document.getElementById('portalContent');

    if (!isLoggedIn()) {
      content.innerHTML = `
        <div class="portal-section" style="text-align:center;padding:32px;">

      });

    const purchasedBeats = state.purchases.map(p => ({ ...getBeat(p.beat_id), purchase: p })).filter(b => b.id);

    content.innerHTML = `
      <div class="portal-section">

        <div class="field">

        </button>

            `).join('')
          }

      </div>

      <div class="portal-section">
        <h3>Purchases (${purchasedBeats.length})</h3>
        <div class="portal-list">
          ${purchasedBeats.length === 0 ? '<p style="color:var(--text-muted);font-size:14px;">No purchases yet.</p>' :
            purchasedBeats.map(({ id, title, artist, price, purchase }) => `
              <div class="list-item">
                <div class="item-info">
                  <div class="title">${title}</div>
                  <div class="sub">${artist} · ${formatPrice(purchase.price)} · ${new Date(purchase.purchased_at).toLocaleDateString()}</div>

            `).join('')
          }
        </div>

    `;

    content.querySelectorAll('.buy-sm').forEach(btn => {
      btn.addEventListener('click', () => {
        const beatId = parseInt(btn.dataset.beatId);

    content.querySelectorAll('.remove-sm').forEach(btn => {
      btn.addEventListener('click', () => {
        const beatId = parseInt(btn.dataset.beatId);

      });

    content.querySelectorAll('.download-sm').forEach(btn => {
      btn.addEventListener('click', () => {
        const token = btn.dataset.token;
        showToast(`Downloading... (token: ${token})`, 'fa-download');
        console.log(`Download token: ${token}`);
      });
    });

    document.getElementById('changePasswordBtn')?.addEventListener('click', () => {
      showToast('Password reset email sent!', 'fa-envelope');
    });

    document.getElementById('signOutBtn')?.addEventListener('click', signOut);

    // =============================================================
    // 🔄 TAB SWITCHING
    // =============================================================
    function switchTab(tab) {
      document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-nav button[data-tab="${tab}"]`)?.classList.add('active');

      document.querySelectorAll('.discover-view, .featured-view, .playlists-view, .singles-view').forEach(v => v.classList.remove('active'));
      document.getElementById(`${tab}View`)?.classList.add('active');

      if (tab === 'featured') renderFeatured();
      if (tab === 'playlists') renderPlaylists();
      if (tab === 'singles') renderSingles();
    }

    // =============================================================
    // 🧭 NAVIGATION HELPERS
    // =============================================================
    function closeAllViews() {
      document.getElementById('playlistDetail')?.classList.remove('active');
      document.getElementById('portalView')?.classList.remove('active');
      document.getElementById('termsView')?.classList.remove('active');
      document.getElementById('modalOverlay')?.classList.remove('active');
    }

    function showPortal() {
      closeAllViews();
      document.getElementById('portalView')?.classList.add('active');
      renderPortal();
    }

    function showTerms() {
      closeAllViews();
      document.getElementById('termsView')?.classList.add('active');
      renderTerms();
    }

    // =============================================================
    // 🔄 UI UPDATE
    // =============================================================
    function updateUI() {
      const likesCount = state.likes.length;
      const badge = document.getElementById('likesBadge');
      if (badge) {
        badge.style.display = likesCount > 0 ? 'block' : 'none';
      }

      const authBtn = document.getElementById('authNavBtn');
      if (authBtn) {
        if (isLoggedIn()) {
          authBtn.textContent = state.user.email.split('@')[0];
          authBtn.style.background = 'rgba(255,255,255,0.06)';
          authBtn.style.color = 'var(--text-secondary)';
        } else {
          authBtn.textContent = 'Sign In';
          authBtn.style.background = 'var(--gradient-1)';
          authBtn.style.color = '#fff';
        }
      }

      updateCartBadge();
    }

    // =============================================================
    // 🚀 INIT
    // =============================================================
    async function init() {
      console.log('=== INIT STARTING ===');
      
      if (supabase) {
        try {
          const { data } = await supabase.auth.getSession();
          if (data.session) {
            state.user = data.session.user;
            state.isGuest = false;
            await loadUserData();
            updateUI();
          }
        } catch (e) {
          console.warn('Supabase session check failed:', e);
        }
      }

      await loadBeatData();

      const overlay = document.getElementById('onboardingOverlay');
      if (overlay) {
        overlay.classList.add('active');
        document.getElementById('onboardingStart')?.addEventListener('click', () => {
          overlay.classList.remove('active');
        });
      }

      console.log('=== INIT COMPLETE ===');
    }

    // =============================================================
    // 🧭 NAVIGATION EVENTS
    // =============================================================
  // =============================================================
  // 🧭 NAVIGATION EVENTS (Wrapped in DOMContentLoaded)
  // =============================================================
  document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM fully loaded - attaching events');

    // Tab navigation
    document.querySelectorAll('.tab-nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        closeAllViews();
        switchTab(btn.dataset.tab);
      });
    });

    // Portal, Terms, Detail
    document.getElementById('portalNavBtn')?.addEventListener('click', showPortal);
    document.getElementById('portalBack')?.addEventListener('click', closeAllViews);
    document.getElementById('termsNavBtn')?.addEventListener('click', showTerms);
    document.getElementById('termsBack')?.addEventListener('click', closeAllViews);
    document.getElementById('detailBack')?.addEventListener('click', closeAllViews);

    // Auth button
    document.getElementById('authNavBtn')?.addEventListener('click', () => {
      if (isLoggedIn()) {
        showPortal();
      } else {
        showAuthModal();
      }
    });

    // Likes button
    document.getElementById('likesNavBtn')?.addEventListener('click', () => {
      if (!isLoggedIn()) {
        showToast('Please sign in to view your likes', 'fa-sign-in-alt');
        showAuthModal();
        return;
      }
      showPortal();
    });

    // Cart button
    document.getElementById('cartNavBtn')?.addEventListener('click', renderCartModal);

    // Discover buttons
    document.getElementById('dislikeBtn')?.addEventListener('click', nextBeat);
    document.getElementById('likeBtn')?.addEventListener('click', () => {
      if (state.currentBeat) {
        toggleLike(state.currentBeat.id);
      }
    });
    document.getElementById('cartBtn')?.addEventListener('click', () => {
      if (state.currentBeat) {
        addToCart(state.currentBeat.id);
      }
    });
    document.getElementById('buyBtn')?.addEventListener('click', () => {
      if (state.currentBeat) {
        showToast(`Buying "${state.currentBeat.title}"`, 'fa-arrow-up');
      }
    });
    document.getElementById('nextBtn')?.addEventListener('click', nextBeat);

       // Player Play button
    document.getElementById('playerPlay')?.addEventListener('click', () => {
      const audio = document.getElementById('audioPlayer');
      if (!audio || !audio.src) {
        showToast('No audio available for this beat', 'fa-exclamation-circle');
        return;
      }
      
      if (state.isPlaying) {
        audio.pause();
        state.isPlaying = false;
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-play"></i>';
        showToast('Paused', 'fa-pause');
      } else {
        audio.play().catch(e => {
          console.warn('Playback failed:', e);
          showToast('Unable to play audio', 'fa-exclamation-circle');
        });
        state.isPlaying = true;
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
        const title = document.getElementById('playerTitle')?.textContent;
        showToast(`Playing "${title}"`, 'fa-play');
      }
    });

    // Player Prev button
    document.getElementById('playerPrev')?.addEventListener('click', function() {
      const prevIndex = state.currentIndex - 1;
      if (prevIndex < 0) {
        showToast('First beat', 'fa-info-circle');
        return;
      }
      const beat = state.beats[prevIndex];
      if (beat) {
        renderCard(beat, prevIndex, state.beats);
      }
    });

    // Player Next button
    document.getElementById('playerNext')?.addEventListener('click', function() {
      const nextIndex = state.currentIndex + 1;
      if (nextIndex >= state.beats.length) {
        showToast('All beats viewed', 'fa-check-circle');
        return;
      }
      const beat = state.beats[nextIndex];
      if (beat) {
        renderCard(beat, nextIndex, state.beats);
      }
    });

    // Auto-advance to next beat when audio ends
    document.getElementById('audioPlayer')?.addEventListener('ended', () => {
      state.isPlaying = false;
      document.getElementById('playerPlay').innerHTML = '<i class="fas fa-play"></i>';
      nextBeat();
    });

        // Like button (heart)
    document.getElementById('playerLike')?.addEventListener('click', function() {
      if (state.currentBeat) {
        toggleLike(state.currentBeat.id);
      }
    });

    // Add to Cart button (+)
    document.getElementById('playerAddToCart')?.addEventListener('click', function() {
      if (state.currentBeat) {
        addToCart(state.currentBeat.id);
      }
    });
    

    // Cart button
    document.getElementById('playerCart')?.addEventListener('click', renderCartModal);

    // Search
    document.getElementById('searchBtn')?.addEventListener('click', () => {
      const query = document.getElementById('searchInput')?.value;
      if (query) searchBeats(query);
    });
    document.getElementById('searchInput')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = document.getElementById('searchInput')?.value;
        if (query) searchBeats(query);
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('modalOverlay')?.classList.contains('active')) return;

      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        nextBeat();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        prevBeat();
      }
      if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        document.getElementById('playerPlay')?.click();
      }
      if (e.key === 'b' || e.key === 'B') {
        document.getElementById('buyBtn')?.click();
      }
      if (e.key === 'l' || e.key === 'L') {
        document.getElementById('likeBtn')?.click();
      }
      if (e.key === 'c' || e.key === 'C') {
        document.getElementById('cartBtn')?.click();
      }
    });
  });

  // =============================================================
  // 🚀 START
  // =============================================================
  init();
  console.log('MarcDBeats v7 loaded!');
  </script>
