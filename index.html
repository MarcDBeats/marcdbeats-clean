<script>
  console.log('=== MARCDBEATS STARTING ===');
  
  // =============================================================
  // AIRTABLE LOADER
  // =============================================================
  console.log('Airtable manual loader initializing...');
  window.Airtable = function(config) {
    return {
      base: function(baseId) {
        return {
          table: function(tableName) {
            return {
              select: function(options) {
                return {
                  all: function() {
                    let url = `https://api.airtable.com/v0/${baseId}/${tableName}?maxRecords=30`;
                    if (options && options.sort) {
                      options.sort.forEach((sort, i) => {
                        url += `&sort[${i}][field]=${sort.field}&sort[${i}][direction]=${sort.direction || 'asc'}`;
                      });
                    }
                    return fetch(url, {
                      headers: { 'Authorization': `Bearer ${config.apiKey}` }
                    })
                    .then(res => {
                      if (!res.ok) throw new Error(`Airtable API error: ${res.status}`);
                      return res.json();
                    })
                    .then(data => data.records);
                  }
                };
              }
            };
          }
        };
      }
    };
  };
  console.log('Airtable manual loader ready');

  // =============================================================
  // 📦 AIRTABLE CONFIG
  // =============================================================
  const AIRTABLE_API_KEY = 'patBKZiLmkE0gKJUw.900d727f261dba00b44ed7196327030a6efd35250f6e8a7c5c8b02df5bb63cef';
  const AIRTABLE_BASE_ID = 'appygG2TL3no2ivmU';
  const AIRTABLE_TABLE_NAME = 'Beats';
  const BEAT_PRICE = 19.99;           // Standard license price

  // Like / cart UI selector constants — update both CSS classes and these strings together
  const LIKE_BUTTON_SELECTOR = '.like-sm[data-beat-id], .like-btn-track[data-beat-id]';

  const LIKE_COLOR_ACTIVE = '#22c55e'; // green used for active like buttons

  const CACHE_DURATION_MS = 10 * 60 * 1000; // 10 minutes
  const CACHE_VERSION = 'v1'; // Bump this whenever the cached data shape changes

  // =============================================================
  // 📦 OPTIONAL EXTERNAL SERVICES
  // =============================================================
  const SUPABASE_URL = 'https://adilswotkpnjcrdvotne.supabase.co';
  // Browser-safe anonymous key; keep Row Level Security enabled for all writable tables.
  const SUPABASE_ANON_KEY = 'sb_publishable_r0x4QU71BB_RPuVZKur0DQ_EcfYgKEM';
  const supabaseClient = window.supabase?.createClient
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;
  // Browser-safe publishable Stripe key; the secret key must remain server-side only.

  // =============================================================

  const state = {
    currentIndex: 0,

    isPlaying: false,
    user: null,
    likes: [],
    purchases: [],
    cart: [],
    isGuest: true,

    beats: [],
    playlists: [],
    singles: [],
    featured: [],
    loaded: false,

    dataLoaded: false,

  // =============================================================
  // 📊 LOGGER — centralized, structured console logger
  // Keeps all log calls in one place so they're easy to silence
  // or extend (e.g. send to an analytics service later).
  // =============================================================
  const logger = {
    info(event, details = '') {
      console.log(`[MDB] ${event}`, details);
    },
    warn(event, details = '') {
      console.warn(`[MDB] ⚠️ ${event}`, details);
    },
    error(event, details = '') {
      console.error(`[MDB] ❌ ${event}`, details);
    },
  };

  // =============================================================
  // 🛠️ HELPERS
  // =============================================================
  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  function showToast(msg, icon = 'fa-info-circle') {
    const toast = document.getElementById('toast');
    if (!toast) return;
    document.getElementById('toastMsg').textContent = msg;
    toast.querySelector('i').className = `fas ${icon}`;
    toast.classList.add('show');
    clearTimeout(window.toastTimer);
    window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function isLiked(beatId) { return state.likes.includes(beatId); }
  // Returns the expected liked state after a toggle — used for optimistic UI updates
  function getToggledLikeState(beatId) { return !isLiked(beatId); }
  function isLoggedIn() { return state.user !== null; }
  function formatPrice(price) { return `$${price.toFixed(2)}`; }
  function formatViews(views) {
    if (views >= 1000000) return `${(views / 1000000).toFixed(1)}M`;
    if (views >= 1000) return `${(views / 1000).toFixed(0)}K`;
    return views.toString();
  }
  function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return mins + ':' + (secs < 10 ? '0' : '') + secs;
  }
  function showLoadingSpinner() {
    const el = document.getElementById('loadingOverlay');
    if (el) el.style.display = 'flex';
  }
  function hideLoadingSpinner() {
    const el = document.getElementById('loadingOverlay');
    if (el) el.style.display = 'none';
  }
  function getBeat(id) { return state.beats.find(b => b.id === id); }
  function getPlaylistBeats(playlistId) {
    const playlist = state.playlists.find(p => p.id === playlistId);
    if (!playlist) return [];
    return playlist.beats;
  }
  function getSingles() { return state.singles; }
  function getAllBeats() { return state.beats; }
  function getPlaylist(id) { return state.playlists.find(p => p.id === id); }
  function getAllPlaylists() { return state.playlists; }
  function getPlaylistSeries() {
  const seriesMap = {};
  
  state.playlists.forEach(playlist => {
    const seriesName = playlist.series || playlist.name;
    
    if (!seriesMap[seriesName]) {
      seriesMap[seriesName] = [];
    }
    seriesMap[seriesName].push(playlist);
  });
  
  Object.keys(seriesMap).forEach(key => {
    seriesMap[key].sort((a, b) => {
      return (a.seriesNumber || 999) - (b.seriesNumber || 999);
    });
  });
  
  const sortedSeries = {};
  Object.keys(seriesMap)
    .sort((a, b) => {
      const minA = Math.min(...seriesMap[a].map(p => p.seriesNumber || 999));
      const minB = Math.min(...seriesMap[b].map(p => p.seriesNumber || 999));
      return minA - minB;
    })
    .forEach(key => {
      sortedSeries[key] = seriesMap[key];
    });
  
  return sortedSeries;
}
  function hasVideo(beat) { return beat.video && beat.video.length > 0; }
  function getBeatMedia(beat) {
    if (hasVideo(beat)) return beat.video;
    if (beat.artwork) return beat.artwork;
    return '/assets/artwork/default-cover.jpg';
  }
  function getPlaylistCover(playlist) {
    if (playlist.cover) return playlist.cover;
    const firstBeat = playlist.beats[0];
    return firstBeat?.artwork || '/assets/artwork/default-cover.jpg';
  }

  // =============================================================
  // 🛡️ DOM GUARDRAILS — required element lookup
  // Use this instead of getElementById for controls that MUST
  // exist. It returns the element (or null) but also logs a clear
  // error when something is missing, so you catch HTML regressions
  // immediately instead of getting a silent no-op.
  // =============================================================
  function requireEl(id) {
    const el = document.getElementById(id);
    if (!el) {
      logger.error(`Required DOM element #${id} not found — check your HTML`);
    }
    return el;
  }

  // =============================================================
  // 🔐 AUTH FUNCTIONS
  // =============================================================
  async function signUp(email, password, username) {
  try {
    const { data, error } = await supabaseClient.auth.signUp({ 
      email, 
      password,
      options: {
        data: { username: username }
      }
    });
    if (error) throw error;
    state.user = data.user;
    state.isGuest = false;
    await loadUserData();
    updateUI();
    showToast('Welcome, ' + username + '!', 'fa-user-check');
    return true;
  } catch (error) {
    showToast(error.message, 'fa-exclamation-circle');
    return false;
  }
}

  async function signIn(email, password) {
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
      state.user = data.user;
      state.isGuest = false;
      await loadUserData();
      updateUI();
      showToast('Welcome back!', 'fa-user-check');
      return true;
    } catch (error) {
      showToast(error.message, 'fa-exclamation-circle');
      return false;
    }
  }

  async function signOut() {
    try {
      await supabaseClient.auth.signOut();
      state.user = null;
      state.isGuest = true;
      state.likes = [];
      state.purchases = [];
      updateUI();
      showToast('Signed out', 'fa-sign-out-alt');
      closeAllViews();
    } catch (error) {
      showToast(error.message, 'fa-exclamation-circle');
    }
  }

  // =============================================================
  // 💾 USER DATA
  // =============================================================
  async function loadUserData() {
    if (!state.user) return;
    try {
      const { data: likesData, error: likesError } = await supabaseClient
        .from('likes')
        .select('beat_id')
        .eq('member_id', state.user.id);
      if (!likesError) state.likes = likesData.map(l => l.beat_id);

      const { data: purchasesData, error: purchasesError } = await supabaseClient
        .from('purchases')
        .select('*')
        .eq('member_id', state.user.id);
      if (!purchasesError) state.purchases = purchasesData;

      updateUI();
    } catch (error) {
      console.warn('Could not load user data:', error);
    }
  }

  async function toggleLike(beatId) {
    if (!isLoggedIn()) {
      showToast('Please sign in to like beats', 'fa-sign-in-alt');
      return;
    }
    const isLikedNow = isLiked(beatId);
    try {
      if (isLikedNow) {
        const { error } = await supabaseClient
          .from('likes')
          .delete()
          .eq('member_id', state.user.id)
          .eq('beat_id', beatId);
        if (!error) {
          state.likes = state.likes.filter(id => id !== beatId);
          showToast('Removed like', 'fa-heart-broken');
        }
      } else {
        const { error } = await supabaseClient
          .from('likes')
          .insert({ member_id: state.user.id, beat_id: beatId });
        if (!error) {
          state.likes.push(beatId);
          const likeBtn = document.getElementById('likeBtn');
          if (likeBtn) {
            likeBtn.classList.add('like-animation');
            setTimeout(() => likeBtn.classList.remove('like-animation'), 500);
          }
          showToast('Liked!', 'fa-heart');
        }
      }
      updateUI();
    } catch (error) {
      showToast(error.message, 'fa-exclamation-circle');
      updateUI();
    }
  }

  // =============================================================
  // 🛒 CART FUNCTIONS
  // =============================================================
  function triggerCartAnimation(el) {
    if (!el) return;
    el.classList.remove('cart-add-animation');
    void el.offsetWidth; // force reflow to re-trigger animation
    el.classList.add('cart-add-animation');
    el.addEventListener('animationend', () => el.classList.remove('cart-add-animation'), { once: true });
  }

  function setSliderProgress(slider, value) {
    if (!slider) return;
    const safeValue = Math.max(0, Math.min(100, Number(value) || 0));
    slider.value = safeValue;
    slider.style.setProperty('--range-progress', `${safeValue}%`);
  }

  function isBeatInCart(beatId) {
    return state.cart.some(item => item.id === beatId);
  }

  function sortBeatsForStore(beats) {
    return [...beats].sort((a, b) => {
      const orderDiff = (a.Order || 999) - (b.Order || 999);
      if (orderDiff !== 0) return orderDiff;
      return (a.title || '').localeCompare(b.title || '');
    });
  }

  function getBeatStoreBeats() {
    const featuredBeats = state.beats.filter(b => b.featured === true);
    return sortBeatsForStore(featuredBeats.length > 0 ? featuredBeats : state.beats);
  }

  function beatMatchesSearch(beat, query = state.searchQuery) {
    if (!query || !query.trim()) return true;
    const q = query.toLowerCase().trim();
    return [
      beat.title,
      beat.artist,
      beat.genre,
      beat.searchKeywords,
      beat.mood,
      beat.tags
    ]
      .filter(Boolean)
      .some(value => value.toString().toLowerCase().includes(q));
  }

  function renderEmptyState(target, icon, title, message) {
    if (!target) return;
    target.innerHTML = `
      <div class="empty-state">
        <i class="fas ${icon}" aria-hidden="true"></i>
        <h3>${title}</h3>
        <p>${message}</p>
      </div>
    `;
  }

  function updateSearchClearButton() {
    const button = document.getElementById('beatSearchBtn');
    if (!button) return;
    const active = !!state.searchQuery;
    button.disabled = !active;
    button.classList.toggle('is-active', active);
  }

  function updateCartButtons() {
    document.querySelectorAll('.cart-action[data-beat-id]').forEach(button => {
      const beatId = parseInt(button.dataset.beatId, 10);
      const inCart = isBeatInCart(beatId);
      button.classList.toggle('in-cart', inCart);
      button.setAttribute('aria-pressed', inCart ? 'true' : 'false');
      button.disabled = inCart;
      const label = button.dataset.cartLabel || 'Add to Cart';
      button.innerHTML = inCart
        ? '<i class="fas fa-check" aria-hidden="true"></i><span>Added</span>'
        : `<i class="fas fa-cart-plus" aria-hidden="true"></i><span>${label}</span>`;
    });

    const fullPlayerAddToCart = document.getElementById('fullPlayerAddToCart');
    if (fullPlayerAddToCart) {
      const inCart = state.currentBeat ? isBeatInCart(state.currentBeat.id) : false;
      fullPlayerAddToCart.classList.toggle('in-cart', inCart);
      fullPlayerAddToCart.disabled = !state.currentBeat || inCart;
      fullPlayerAddToCart.innerHTML = inCart
        ? '<i class="fas fa-check" aria-hidden="true"></i><span>Added to Cart</span>'
        : '<i class="fas fa-cart-plus" aria-hidden="true"></i><span>Add to Cart</span>';
    }
  }

  function pulseCartBadges() {
    ['cartBadge', 'sidebarCartBadge', 'fullPlayerCartBadge'].forEach(id => {
      const el = document.getElementById(id);
      if (el && state.cart.length > 0) triggerCartAnimation(el);
    });
  }

  // Returns all cart buttons on the page for a specific beat
  function getCartButtonsForBeat(beatId) {
    const safeId = parseInt(beatId, 10);
    if (isNaN(safeId)) return [];
    return document.querySelectorAll(`.cart-action[data-beat-id="${safeId}"]`);
  }

  function addToCart(beatId) {
    const beat = getBeat(beatId);
    if (!beat) return;
    if (isBeatInCart(beatId)) return;
    state.cart.push(beat);
    updateCartBadge();
    getCartButtonsForBeat(beatId).forEach(triggerCartAnimation);
    pulseCartBadges();
  }

  function removeFromCart(beatId) {
    state.cart = state.cart.filter(b => b.id !== beatId);
    updateCartBadge();
    renderCartModal();
  }

  function updateCartBadge() {
    ['cartBadge', 'sidebarCartBadge', 'fullPlayerCartBadge'].forEach(id => {
      const badge = document.getElementById(id);
      if (!badge) return;
      badge.textContent = state.cart.length;
      badge.style.display = state.cart.length > 0 ? 'inline-flex' : 'none';
    });
    updateCartButtons();
  }

  // =============================================================
  // 📦 LOAD DATA FROM AIRTABLE
  // =============================================================
  async function loadBeatData(retryCount = 0) {
  // Check if data is already loaded
  if (state.dataLoaded && state.beats.length > 0) {
    logger.info('data:already-loaded', { beats: state.beats.length });
    renderBeatStore();
    renderBeatTapes();
    renderSamples();
    updateUI();
    return;
  }

  showLoadingSpinner();

  // Check localStorage cache first (valid for 10 minutes)
  if (retryCount === 0) {
    try {
      const cached = localStorage.getItem('marcdbeats_beats_cache');
      if (cached) {
        const parsed = JSON.parse(cached);
        // Validate versioned envelope: must have correct version, non-empty beats array,
        // valid timestamps, and not yet expired.
        const isValid =
          parsed.version === CACHE_VERSION &&
          Array.isArray(parsed.data) && parsed.data.length > 0 &&
          typeof parsed.createdAt === 'number' &&
          typeof parsed.ttl === 'number' &&
          (Date.now() - parsed.createdAt < parsed.ttl);

        if (isValid) {
          const cachedBeats = parsed.data;
          const ageSeconds = Math.round((Date.now() - parsed.createdAt) / 1000);
          logger.info('cache:hit', { beats: cachedBeats.length, ageSecs: ageSeconds });
          state.beats = cachedBeats;
          state.featured = cachedBeats.filter(b => b.featured === true).sort((a, b) => (a.Order || 999) - (b.Order || 999));
          state.singles = cachedBeats.filter(b => b.isSingle === true);
          const cachedPlaylistIds = [...new Set(cachedBeats.map(b => b.playlist).filter(Boolean))];
          state.playlists = cachedPlaylistIds.map(id => {
            const pBeats = cachedBeats.filter(b => b.playlist === id);
            const firstBeat = pBeats[0];
            return {
              id,
              name: id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
              series: firstBeat?.series || '',
              seriesNumber: firstBeat?.seriesNumber || 999,
              beats: pBeats.sort((a, b) => a.trackNumber - b.trackNumber)
            };
          });
          state.loaded = true;
          state.dataLoaded = true;
          renderBeatStore(); renderBeatTapes(); renderSamples(); updateUI();
          hideLoadingSpinner();
          return;
        } else {
          // Cache is stale, outdated version, or corrupt — clear it and refetch
          const reason = parsed.version !== CACHE_VERSION ? 'version-mismatch' : 'expired-or-corrupt';
          logger.info('cache:invalidated', { reason });
          localStorage.removeItem('marcdbeats_beats_cache');
        }
      } else {
        logger.info('cache:cold');
      }
    } catch (e) {
      logger.warn('cache:parse-error', e.message);
      localStorage.removeItem('marcdbeats_beats_cache');
    }
  }

  try {
    // Add delay for retries
    if (retryCount > 0) {
      const delay = retryCount * 1500; // 1.5s, 3s, 4.5s, 6s...
      logger.info('fetch:retry', { attempt: retryCount, delayMs: delay });
      await new Promise(resolve => setTimeout(resolve, delay));
    }

    logger.info('fetch:start', { table: AIRTABLE_TABLE_NAME });
    let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}?maxRecords=100`;

    const response = await fetch(url, {
      headers: { 'Authorization': `Bearer ${AIRTABLE_API_KEY}` }
    });

    // Handle rate limiting (429)
    if (response.status === 429) {
      logger.warn('fetch:rate-limited', { retryCount });
      if (retryCount < 5) {
        return loadBeatData(retryCount + 1);
      } else {
        throw new Error('Rate limit exceeded. Please wait a moment and refresh.');
      }
    }

    if (!response.ok) {
      throw new Error(`Airtable API error: ${response.status} - ${response.statusText}`);
    }

    const data = await response.json();
    logger.info('fetch:success', { records: data.records?.length ?? 0 });

    if (!data.records || data.records.length === 0) {
      logger.warn('fetch:empty');
      state.beats = [];
      state.loaded = true;
      state.dataLoaded = true;
      renderBeatStore();
      renderBeatTapes();
      renderSamples();
      updateUI();
      showToast('No beats found in Airtable', 'fa-exclamation-circle');
      return;
    }

    state.beats = data.records.map(record => ({
  id: parseInt(record.id, 36),
  title: record.fields['Beat Name'] || 'Untitled',
  artist: record.fields['Artist'] || 'Unknown',
  genre: record.fields['Genre'] || '',
  price: record.fields['Price'] || 5.00,
  bpm: record.fields['BPM'] || '',
  artwork: record.fields['Artwork'] || 'https://via.placeholder.com/400x400/DC2626/FFFFFF?text=BEAT',
  video: record.fields['Video'] || '',
  mp3: record.fields['MP3'] || '',
  tags: record.fields['Tags'] || [],
  playlist: record.fields['Playlist'] || '',
  series: record.fields['Series'] || '',
  seriesNumber: record.fields['Series Number'] || 999, // ← Using your field name
  sync: record.fields['Sync'] || false,
  trackNumber: record.fields['Track Number'] || 999,
  featured: record.fields['Featured'] || false,
  Order: record.fields['Order'] || 999,
  searchKeywords: `${record.fields['Beat name'] || ''} ${record.fields['Artist'] || ''} ${record.fields['Genre'] || ''} ${record.fields['Tik Tok'] || ''} ${record.fields['Instagram'] || ''}`
}));
    // Shuffle beats for random order
    state.featured = state.beats
  .filter(b => b.featured === true)
  .sort((a, b) => (a.Order || 999) - (b.Order || 999));
    state.singles = state.beats.filter(beat => beat.isSingle === true);

    const playlistIds = [...new Set(state.beats.map(b => b.playlist).filter(Boolean))];
state.playlists = playlistIds.map(id => {
  const beats = state.beats.filter(b => b.playlist === id);
  const firstBeat = beats[0];
  return {
    id: id,
    name: id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
    series: firstBeat?.series || '',
    seriesNumber: firstBeat?.seriesNumber || 999,
    beats: beats.sort((a, b) => a.trackNumber - b.trackNumber)
  };
});

    state.loaded = true;
    state.dataLoaded = true;

    // Save to localStorage cache with versioned envelope for safer invalidation
    try {
      localStorage.setItem('marcdbeats_beats_cache', JSON.stringify({
        version: CACHE_VERSION,
        createdAt: Date.now(),
        ttl: CACHE_DURATION_MS,
        data: state.beats,
      }));
      logger.info('cache:saved', { beats: state.beats.length });
    } catch (e) {
      logger.warn('cache:save-failed', e.message);
    }

    renderBeatStore();
    renderBeatTapes();
    renderSamples();
    updateUI();
    hideLoadingSpinner();

    logger.error('fetch:failure', error.message);
    state.loaded = true;
    state.dataLoaded = true;
    hideLoadingSpinner();
    renderBeatStore();
    renderBeatTapes();
    renderSamples();
    updateUI();
    showToast('Failed to load beats: ' + error.message, 'fa-exclamation-circle');
  }
}

  // =============================================================
  // 🎬 RENDER CARD (SINGLE VERSION - FIXED)
  // =============================================================
function renderCard(beat, index, queue) {
  if (!beat) {
    console.error('No beat provided to renderCard');
    return;
  }
  
  console.log('🎵 renderCard called for:', beat.title);
  
  // Remember what's playing
  state.playerQueue = queue || state.beats;
  state.currentIndex = index;
  state.currentBeat = beat;

  // Highlight this beat across all list views
  updateNowPlayingUI(beat.id);

  // Reset progress bars whenever a new beat is selected
  const _prog = document.getElementById('progressSlider');
  const _fullProg = document.getElementById('fullProgressSlider');
  if (_prog) _prog.value = 0;
  if (_fullProg) _fullProg.value = 0;
  const _tCur = document.getElementById('timeCurrent');
  const _tFull = document.getElementById('fullTimeCurrent');
  if (_tCur) _tCur.textContent = '0:00';
  if (_tFull) _tFull.textContent = '0:00';

  // UPDATE BOTTOM PLAYER
  const titleEl = document.getElementById('playerTitle');
  if (titleEl) titleEl.textContent = beat.title;
  
  const artistEl = document.getElementById('playerArtist');
  if (artistEl) artistEl.textContent = beat.artist;
  
  const artwork = document.getElementById('playerArtwork');
  if (artwork) {
    if (beat.artwork) {
      artwork.innerHTML = `<img src="${beat.artwork}" alt="${beat.title}" style="width:100%;height:100%;object-fit:cover;" />`;
    } else {
      artwork.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;background:#1a1a2e;"><i class="fas fa-music"></i></div>`;
    }
  }
  
  // UPDATE FULL PLAYER
  const fullTitle = document.getElementById('fullPlayerTitle');
  if (fullTitle) fullTitle.textContent = beat.title;
  
  const fullArtist = document.getElementById('fullPlayerArtist');
  if (fullArtist) fullArtist.textContent = beat.artist;
  
  const fullArtwork = document.getElementById('fullPlayerArtwork');
  if (fullArtwork) {
    if (beat.artwork) {
      fullArtwork.innerHTML = `<img src="${beat.artwork}" alt="${beat.title}" style="width:100%;height:100%;object-fit:cover;" />`;
    } else {
      fullArtwork.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:48px;background:#1a1a2e;"><i class="fas fa-music"></i></div>`;
    }
  }
  
  // LOAD AND PLAY AUDIO
  const audio = document.getElementById('audioPlayer');
  if (audio) {
    // Log audio element errors (network failures, unsupported format, etc.)
    audio.onerror = function() {
      logger.error('audio:error', { beat: beat.title, code: audio.error?.code });
    };
  }
  if (audio && beat.mp3) {
    logger.info('audio:load', { beat: beat.title });
    audio.src = beat.mp3;
    audio.load();
    
    const playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise
        .then(() => {
          logger.info('audio:playing', { beat: beat.title });
          state.isPlaying = true;
          document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
          document.getElementById('fullPlayerPlay').innerHTML = '<i class="fas fa-pause"></i>';
          updateCartButtons();
        })
        .catch(err => {
          logger.warn('audio:autoplay-blocked', { beat: beat.title, reason: err.message });
          state.isPlaying = false;
          document.getElementById('playerPlay').innerHTML = '<i class="fas fa-play"></i>';
          document.getElementById('fullPlayerPlay').innerHTML = '<i class="fas fa-play"></i>';
          updateCartButtons();
        });
    }
  } else {
    logger.warn('audio:no-mp3', { beat: beat.title });
  }
  updateCartButtons();
}

  // =============================================================
  // 🔄 NAVIGATION FUNCTIONS
  // =============================================================
  function prevBeat() {
  let playlistBeats;
  
  // If we're in a playlist, use those beats
  if (state.currentPlaylist !== 'featured') {
    const playlist = getPlaylist(state.currentPlaylist);
    if (playlist) {
      playlistBeats = playlist.beats;
    }
  }
  
  // Otherwise use featured beats
  if (!playlistBeats) {
    playlistBeats = state.beats
      .filter(b => b.featured === true)
      .sort((a, b) => (a.Order || 999) - (b.Order || 999));
  }
  
  if (playlistBeats.length === 0) return;
  
  // Find current beat in the list
  const currentIndex = playlistBeats.findIndex(b => b.id === state.currentBeat?.id);
  let prevIndex = currentIndex - 1;
  if (prevIndex < 0) {
    prevIndex = playlistBeats.length - 1;
  }
  
  const beat = playlistBeats[prevIndex];
  renderCard(beat, state.beats.indexOf(beat), state.beats);
}

  function nextBeat() {
  let playlistBeats;
  
  // If we're in a playlist, use those beats
  if (state.currentPlaylist !== 'featured') {
    const playlist = getPlaylist(state.currentPlaylist);
    if (playlist) {
      playlistBeats = playlist.beats;
    }
  }
  
  // Otherwise use featured beats
  if (!playlistBeats) {
    playlistBeats = state.beats
      .filter(b => b.featured === true)
      .sort((a, b) => (a.Order || 999) - (b.Order || 999));
  }
  
  if (playlistBeats.length === 0) return;
  
  // Find current beat in the list
  const currentIndex = playlistBeats.findIndex(b => b.id === state.currentBeat?.id);
  let nextIndex = currentIndex + 1;
  if (nextIndex >= playlistBeats.length) {
    nextIndex = 0;
  }
  
  const beat = playlistBeats[nextIndex];
  renderCard(beat, state.beats.indexOf(beat), state.beats);
}

  // =============================================================
  // 🎵 PLAYER
  // =============================================================
  function updatePlayer(beat) {
  if (!beat) return;
  
  const titleEl = document.getElementById('playerTitle');
  const artistEl = document.getElementById('playerArtist');
  if (titleEl) titleEl.textContent = beat.title;
  if (artistEl) artistEl.textContent = beat.artist;
  
  const artwork = document.getElementById('playerArtwork');
  if (artwork) {
    if (beat.artwork) {
      artwork.innerHTML = `<img src="${beat.artwork}" alt="${beat.title}" style="width:100%;height:100%;object-fit:cover;" />`;
    } else {
      artwork.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;background:#1a1a2e;"><i class="fas fa-music"></i></div>`;
    }
  }
    
    const audio = document.getElementById('audioPlayer');
    if (audio && beat.mp3) {
      audio.src = beat.mp3;
      audio.load();
    }
    
    const liked = isLiked(beat.id);
    const likeBtn = document.getElementById('playerLike');
    if (likeBtn) {
      likeBtn.classList.toggle('liked', liked);
    }
        // Set up progress bar tracking for this audio
    const progressSlider = document.getElementById('progressSlider');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');

    if (audio && progressSlider) {
      // Remove old listeners to prevent duplicates
      audio.removeEventListener('timeupdate', updateProgress);
      // Add the new listener
      audio.addEventListener('timeupdate', updateProgress);
      
      function updateProgress() {
        if (!isNaN(audio.duration)) {
          const progress = (audio.currentTime / audio.duration) * 100;
          progressSlider.value = progress;
          timeCurrent.textContent = formatTime(audio.currentTime);
          timeTotal.textContent = formatTime(audio.duration);
        }
      }

      // Update total time once metadata is loaded
      audio.addEventListener('loadedmetadata', function() {
        timeTotal.textContent = formatTime(audio.duration);
      });

            // Allow clicking/dragging on the progress bar to seek
      let isDragging = false;
      
      progressSlider.addEventListener('pointerdown', function() {
        isDragging = true;
      });
      
      progressSlider.addEventListener('pointerup', function() {
        isDragging = false;
        if (!isNaN(audio.duration) && audio.duration > 0) {
          const seekTime = (parseFloat(this.value) / 100) * audio.duration;
          audio.currentTime = seekTime;
        }
      });
      
      // Also allow clicking on the progress bar track (not just dragging)
      progressSlider.addEventListener('change', function() {
        if (!isNaN(audio.duration) && audio.duration > 0) {
          const seekTime = (parseFloat(this.value) / 100) * audio.duration;
          audio.currentTime = seekTime;
        }
      });
      
      // Update the visual position while dragging, but don't seek
      progressSlider.addEventListener('input', function() {
        // Update the time display to show where you're dragging to
        if (!isNaN(audio.duration) && audio.duration > 0) {
          const seekTime = (parseFloat(this.value) / 100) * audio.duration;
          timeCurrent.textContent = formatTime(seekTime);
        }
      });
            // Fallback: Update progress bar every second even if timeupdate doesn't fire
      if (window.progressInterval) {
        clearInterval(window.progressInterval);
      }
      window.progressInterval = setInterval(function() {
        if (audio && !isNaN(audio.duration) && audio.currentTime > 0) {
          const progress = (audio.currentTime / audio.duration) * 100;
          progressSlider.value = progress;
          timeCurrent.textContent = formatTime(audio.currentTime);
          timeTotal.textContent = formatTime(audio.duration);
        }
      }, 500);
    }
  }

    const timeTotal = document.getElementById('fullTimeTotal');

function renderBeatTapes() {

  }

  const seriesMap = getPlaylistSeries();
  const seriesNames = Object.keys(seriesMap);

  grid.innerHTML = seriesNames.map(seriesName => {
    const seriesPlaylists = seriesMap[seriesName];
    const totalBeats = seriesPlaylists.reduce((sum, playlist) => sum + playlist.beats.length, 0);
    const isExpanded = !!state.expandedSeries[seriesName];
    const visibleCount = state.seriesVisibleCounts[seriesName] || 12;
    const visiblePlaylists = isExpanded ? seriesPlaylists.slice(0, visibleCount) : [];

    return `
      <section class="series-accordion ${isExpanded ? 'expanded' : ''}" data-series="${seriesName}">
        <button class="series-toggle" data-series="${seriesName}" aria-expanded="${isExpanded ? 'true' : 'false'}">

            <div class="series-title">${seriesName}</div>
            <div class="series-summary">${seriesPlaylists.length} tape${seriesPlaylists.length === 1 ? '' : 's'} · ${totalBeats} beats</div>
          </div>
          <span class="series-toggle-icon"><i class="fas fa-chevron-${isExpanded ? 'up' : 'down'}" aria-hidden="true"></i></span>
        </button>
        <div class="series-panel">
          <div class="series-playlist-list">
            ${visiblePlaylists.map(playlist => `
              <button class="series-playlist-item" data-playlist-id="${playlist.id}" aria-label="Open ${playlist.name}">
                <span class="series-playlist-number">${playlist.seriesNumber ? `#${playlist.seriesNumber}` : 'Tape'}</span>

                  <small>${playlist.beats.length} beats</small>
                </span>
                <i class="fas fa-chevron-right" aria-hidden="true"></i>
              </button>
            `).join('')}
          </div>
          ${isExpanded && visibleCount < seriesPlaylists.length ? `<button class="series-load-more" data-series="${seriesName}">Load more</button>` : ''}
        </div>
      </section>
    `;
  }).join('');

  grid.querySelectorAll('.series-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const seriesName = btn.dataset.series;
      state.expandedSeries[seriesName] = !state.expandedSeries[seriesName];
      state.seriesVisibleCounts[seriesName] = state.seriesVisibleCounts[seriesName] || 12;
      renderBeatTapes();
    });
  });

  grid.querySelectorAll('.series-load-more').forEach(btn => {
    btn.addEventListener('click', (event) => {
      event.stopPropagation();
      const seriesName = btn.dataset.series;
      state.seriesVisibleCounts[seriesName] = (state.seriesVisibleCounts[seriesName] || 12) + 12;
      renderBeatTapes();
    });
  });

  grid.querySelectorAll('.series-playlist-item').forEach(button => {
    button.addEventListener('click', () => showPlaylistDetail(button.dataset.playlistId));
  });
}

// Helper: Attach events to beat cards
function attachBeatCardEvents() {
  let grid = document.getElementById('beatStoreGrid');
  if (!grid) return;
  const beatStoreQueue = getBeatStoreBeats().filter(b => beatMatchesSearch(b));

  const newGrid = grid.cloneNode(true);
  grid.parentNode.replaceChild(newGrid, grid);
  grid = newGrid;

  grid.addEventListener('click', function(e) {
    const card = e.target.closest('.beat-card');
    if (!card) return;
    if (e.target.closest('button')) return;

    const beatId = parseInt(card.dataset.beatId, 10);
    if (isNaN(beatId)) return;

    const index = beatStoreQueue.findIndex(b => b.id === beatId);
    if (index === -1) return;

    const beat = beatStoreQueue[index];
    renderCard(beat, index, beatStoreQueue);
  });

  grid.addEventListener('click', function(e) {
    const cartBtn = e.target.closest('.cart-action');
    if (!cartBtn) return;

    e.stopPropagation();
    const beatId = parseInt(cartBtn.dataset.beatId, 10);
    if (isNaN(beatId)) return;

    addToCart(beatId);
  });

  updateCartButtons();
}

  // Single DOMContentLoaded handler — all event wiring lives here
  // so DOM elements are guaranteed to exist before we query them.
  let _muteBtnInserted = false; // guard against duplicate mute button insertion
  document.addEventListener('DOMContentLoaded', function() {
    logger.info('app:dom-ready');

    // ---- Full player close (single listener, no duplicates) ----
    const _closeBtnEl = requireEl('fullPlayerClose');
    if (_closeBtnEl) {
      _closeBtnEl.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        closeFullPlayer();
      });
    }

    // ---- Filter buttons ----
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const activeTab = document.querySelector('.tab-nav .active');
        if (activeTab) {
          const tab = activeTab.dataset.tab;
          if (tab === 'beatstore') renderBeatStore();
          if (tab === 'beattapes') renderBeatTapes();
          if (tab === 'samples') renderSamples();
        }
      });
    });

    document.querySelectorAll('.tab-nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        closeAllViews();
        switchTab(btn.dataset.tab);
      });
    });

    document.getElementById('portalNavBtn')?.addEventListener('click', showPortal);
    document.getElementById('portalBack')?.addEventListener('click', closeAllViews);

    document.getElementById('spotifyPlayer')?.addEventListener('click', (e) => {
  // Don't open if clicking on buttons OR if the full player is already open
  if (e.target.closest('button')) return;
  if (document.getElementById('fullPlayerOverlay').classList.contains('active')) return;
  if (state.currentBeat) {
    openFullPlayer();
    syncFullPlayer();
  }
});
    

// Header logo goes to Beat Store
document.getElementById('homeNavBtn')?.addEventListener('click', () => {
  closeAllViews();
  switchTab('beatstore');
});
    document.getElementById('termsNavBtn')?.addEventListener('click', showTerms);
    document.getElementById('termsBack')?.addEventListener('click', closeAllViews);
    document.getElementById('detailBack')?.addEventListener('click', closeAllViews);

    document.getElementById('cartNavBtn')?.addEventListener('click', renderCartModal);

    requireEl('playerPlay')?.addEventListener('click', () => {
      const audio = requireEl('audioPlayer');
      if (!audio || !audio.src) {
        showToast('No audio available for this beat', 'fa-exclamation-circle');
        return;
      }
      
      if (state.isPlaying) {
        audio.pause();
        state.isPlaying = false;
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-play"></i>';
        const fpBtn = document.getElementById('fullPlayerPlay');
        if (fpBtn) fpBtn.innerHTML = '<i class="fas fa-play"></i>';
        showToast('Paused', 'fa-pause');
      } else {
        audio.play().catch(e => {
          logger.warn('audio:playback-failed', e.message);
          showToast('Unable to play audio', 'fa-exclamation-circle');
        });
        state.isPlaying = true;
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
        const fpBtn = document.getElementById('fullPlayerPlay');
        if (fpBtn) fpBtn.innerHTML = '<i class="fas fa-pause"></i>';
        const title = document.getElementById('playerTitle')?.textContent;
        showToast(`Playing "${title}"`, 'fa-play');
      }
    });

    document.getElementById('playerPrev')?.addEventListener('click', prevBeat);
    document.getElementById('playerNext')?.addEventListener('click', nextBeat);

    requireEl('audioPlayer')?.addEventListener('ended', () => {
      logger.info('audio:ended', { beat: state.currentBeat?.title });
      state.isPlaying = false;
      document.getElementById('playerPlay').innerHTML = '<i class="fas fa-play"></i>';
      const fpBtn = document.getElementById('fullPlayerPlay');
      if (fpBtn) fpBtn.innerHTML = '<i class="fas fa-play"></i>';
      nextBeat();
    });

    document.getElementById('beatSearchBtn')?.addEventListener('click', () => {
      const input = document.getElementById('beatSearchInput');
      if (!input) return;
      input.value = '';
      searchBeats('');
      input.focus();
    });
    document.getElementById('beatSearchInput')?.addEventListener('input', (e) => {
      searchBeats(e.target.value);
    });

    document.addEventListener('keydown', (e) => {
      if (document.getElementById('modalOverlay')?.classList.contains('active')) return;

      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        nextBeat();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        prevBeat();
      }
      if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        document.getElementById('playerPlay')?.click();
      }
      if (e.key === 'c' || e.key === 'C') {
        renderCartModal();
      }
      if (e.key === 'f' || e.key === 'F') {
        if (state.currentBeat) openFullPlayer();
      }
    });
    
    // ---- Desktop sidebar navigation ----
    document.querySelectorAll('.sidebar-nav-btn[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        closeAllViews();
        switchTab(btn.dataset.tab);
      });
    });
    document.getElementById('sidebarCartBtn')?.addEventListener('click', renderCartModal);
    document.querySelector('.sidebar-brand')?.addEventListener('click', () => {
      closeAllViews();
      switchTab('beatstore');
    });

    init();
    logger.info('app:init-called');

    // ---- Full Player Controls (wired here so DOM exists) ----
    const _fullOverlay = document.getElementById('fullPlayerOverlay');

    requireEl('fullPlayerPlay')?.addEventListener('click', function() {
      const audio = requireEl('audioPlayer');
      if (!audio || !audio.src) {
        showToast('No audio available', 'fa-exclamation-circle');
        return;
      }
      if (state.isPlaying) {
        audio.pause();
        state.isPlaying = false;
        document.getElementById('fullPlayerPlay').innerHTML = '<i class="fas fa-play"></i>';
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-play"></i>';
      } else {
        audio.play().catch(e => {
          logger.warn('audio:playback-failed', e.message);
          showToast('Unable to play audio', 'fa-exclamation-circle');
        });
        state.isPlaying = true;
        document.getElementById('fullPlayerPlay').innerHTML = '<i class="fas fa-pause"></i>';
        document.getElementById('playerPlay').innerHTML = '<i class="fas fa-pause"></i>';
      }
    });

    requireEl('fullPlayerPrev')?.addEventListener('click', prevBeat);
    requireEl('fullPlayerNext')?.addEventListener('click', nextBeat);

    document.getElementById('fullPlayerAddToCart')?.addEventListener('click', function() {
      if (state.currentBeat) addToCart(state.currentBeat.id);
    });

    document.getElementById('fullPlayerCart')?.addEventListener('click', renderCartModal);

    // Full player progress bar seeking
    document.getElementById('fullProgressSlider')?.addEventListener('input', function() {
      const audio = document.getElementById('audioPlayer');
      if (audio && !isNaN(audio.duration) && audio.duration > 0) {
        audio.currentTime = (parseFloat(this.value) / 100) * audio.duration;
        setSliderProgress(this, this.value);
      }
    });

    // ---- Unified Audio Progress Tracking ----
    const _audioEl = requireEl('audioPlayer');
    const _progSlider = document.getElementById('progressSlider');
    const _fullProgSlider = document.getElementById('fullProgressSlider');

    if (_audioEl) {
      _audioEl.addEventListener('timeupdate', function() {
        if (!isNaN(_audioEl.duration) && _audioEl.duration > 0) {
          const progress = (_audioEl.currentTime / _audioEl.duration) * 100;
          if (_progSlider) setSliderProgress(_progSlider, progress);
          const tCur = document.getElementById('timeCurrent');
          if (tCur) tCur.textContent = formatTime(_audioEl.currentTime);
          if (_fullOverlay?.classList.contains('active')) {
            if (_fullProgSlider) setSliderProgress(_fullProgSlider, progress);
            const ftCur = document.getElementById('fullTimeCurrent');
            if (ftCur) ftCur.textContent = formatTime(_audioEl.currentTime);
          }
        }
      });

      _audioEl.addEventListener('loadedmetadata', function() {
        const dur = formatTime(_audioEl.duration);
        const tTot = document.getElementById('timeTotal');
        const ftTot = document.getElementById('fullTimeTotal');
        if (tTot) tTot.textContent = dur;
        if (ftTot) ftTot.textContent = dur;
      });
    }

    // Bottom progress bar seeking
    _progSlider?.addEventListener('input', function() {
      if (_audioEl && !isNaN(_audioEl.duration) && _audioEl.duration > 0) {
        _audioEl.currentTime = (parseFloat(this.value) / 100) * _audioEl.duration;
        setSliderProgress(this, this.value);
      }
    });

    // ---- Volume control with persistence ----
    // Restore saved volume on app start; clamp to [0, 1] to guard against bad data
    const _rawVol = parseFloat(localStorage.getItem('marcdbeats_volume') ?? '1');
    const _savedVolume = Number.isNaN(_rawVol) ? 1 : Math.min(1, Math.max(0, _rawVol));
    const _volSlider = document.getElementById('fullVolumeSlider');
    const _volRow = document.querySelector('.full-player-volume');

    // Feature-detect whether programmatic volume control is supported.
    // Desktop browsers and Android Chrome/WebView support it fully.
    // iOS Safari silently ignores audio.volume — volume is hardware-only on iOS.
    // Two probe values (0.123 and 0.879) are chosen to be far from common default volumes
    // (0, 0.5, 1.0) so they are unlikely to coincidentally match the real volume, preventing
    // false negatives. We pick whichever probe differs from the current volume to ensure
    // the test represents a genuine change, then verify the element actually adopted it.
    let _volumeControlSupported = true;
    if (_audioEl) {
      const _prevVol = _audioEl.volume;
      const _probeA = 0.123, _probeB = 0.879;
      const _probe = (_prevVol !== _probeA) ? _probeA : _probeB;
      _audioEl.volume = _probe;
      _volumeControlSupported = Math.abs(_audioEl.volume - _probe) < 0.01;
      _audioEl.volume = _prevVol; // restore
    }

    if (!_volumeControlSupported && _volRow) {
      // Programmatic volume not supported (iOS) — hide slider, show mute toggle
      _volRow.classList.add('ios-volume-hidden');
      const _muteBtn = document.createElement('button');
      _muteBtn.id = 'iosMuteBtn';
      _muteBtn.className = 'mute-toggle-btn';
      _muteBtn.setAttribute('aria-label', 'Mute / Unmute');
      _muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
      _muteBtn.addEventListener('click', function() {
        if (_audioEl) {
          _audioEl.muted = !_audioEl.muted;
          _muteBtn.innerHTML = _audioEl.muted
            ? '<i class="fas fa-volume-mute"></i>'
            : '<i class="fas fa-volume-up"></i>';
          _muteBtn.classList.toggle('muted', _audioEl.muted);
        }
      });
      const _actionsRow = document.getElementById('fullPlayerActions');
      if (_actionsRow && !_muteBtnInserted) {
        _actionsRow.appendChild(_muteBtn);
        _muteBtnInserted = true;
      }
    } else {
      if (_volSlider) {
        _volSlider.value = _savedVolume;
        _volSlider.style.setProperty('--range-progress', `${_savedVolume * 100}%`);
      }
      if (_audioEl) _audioEl.volume = _savedVolume;

      _volSlider?.addEventListener('input', function() {
        const vol = parseFloat(this.value);
        if (_audioEl) _audioEl.volume = vol;
        // Persist volume across sessions
        localStorage.setItem('marcdbeats_volume', this.value);
        this.style.setProperty('--range-progress', `${vol * 100}%`);
        const icon = document.getElementById('volumeIcon');
        if (icon) {
          if (vol === 0) icon.className = 'fas fa-volume-mute';
          else if (vol < 0.5) icon.className = 'fas fa-volume-down';
          else icon.className = 'fas fa-volume-up';
        }
      });
    }

    // Swipe down to close full player
    let _touchStartY = 0;
    _fullOverlay?.addEventListener('touchstart', function(e) {
      _touchStartY = e.touches[0].clientY;
    }, { passive: true });
    _fullOverlay?.addEventListener('touchmove', function(e) {
      if (e.touches[0].clientY - _touchStartY > 80) {
        closeFullPlayer();
        _touchStartY = 0;
      }
    }, { passive: true });

  });

  
</script>

  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-box input {
  background: rgba(255, 255, 255, 0.04) !important;
  border: 1px solid rgba(255, 255, 255, 0.08) !important;
  border-radius: 14px !important;
  padding: 14px 16px !important;
  margin-bottom: 12px !important;
}

.modal-box input:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15) !important;
}

.modal-box .btn-primary {
  background: var(--gradient-1) !important;
  border-radius: 14px !important;
  padding: 16px !important;
  box-shadow: 0 4px 24px rgba(220, 38, 38, 0.25) !important;
}

.modal-box .btn-primary:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 32px rgba(220, 38, 38, 0.35) !important;
}

.modal-box .btn-secondary {
  background: rgba(255, 255, 255, 0.04) !important;
  border: 1px solid rgba(255, 255, 255, 0.06) !important;
}

.modal-box .btn-secondary:hover {
  background: rgba(255, 255, 255, 0.08) !important;
}

/* ===== OFFTOP-STYLE TABS ===== */

/* Tab Navigation */
.tab-nav {
  display: flex;
  gap: 4px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-secondary);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.tab-nav::-webkit-scrollbar {
  display: none;
}

.tab-nav button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 15px;
  font-weight: 600;
  padding: 8px 16px;
  cursor: pointer;
  transition: 0.2s;
  border-radius: 20px;
  white-space: nowrap;
}

.tab-nav button.active {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.08);
}

.tab-nav button:hover {
  color: var(--text-secondary);
}

/* Filter Row */
.filter-row {
  display: flex;
  gap: 12px;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
}

.filter-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  padding: 4px 12px;
  cursor: pointer;
  transition: 0.2s;
  border-radius: 12px;
}

.filter-btn.active {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.06);
}

.filter-btn:hover {
  color: var(--text-secondary);
}

/* Tab Content Area */
.tab-content-area {
  height: 100%;
  overflow-y: auto;
  padding-bottom: 80px;
}

.tab-content {
  display: none;
  padding: 8px 16px;
}

.tab-content.active {
  display: block;
}

/* Beat Grid - Offtop Style */
.beat-grid {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.beat-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.beat-card:hover {
  background: rgba(255, 255, 255, 0.03);
}

.beat-card-art {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}

.beat-card-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.featured-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  font-size: 8px;
  background: var(--accent);
  color: #fff;
  padding: 1px 4px;
  border-radius: 3px;
}

.beat-card-info {
  flex: 1;
  min-width: 0;
}

.beat-card-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.beat-card-artist {
  font-size: 12px;
  color: var(--text-muted);
}

.beat-card-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.beat-card-actions button {
  background: none;
  border: none;
  color: var(--text-muted);
  padding: 6px 8px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.2s;
  font-size: 14px;
}

.beat-card-actions .play-sm:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.06);
}

.beat-card-actions .cart-sm:hover {
  color: var(--accent);
}

.beat-card-actions .like-sm.liked {
  color: #22c55e;
}

/* Playlist Grid (already exists, keep as-is) */
.playlist-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

/* Playlist Card (already exists, keep as-is) */
.playlist-grid .playlist-card {
  background: var(--bg-card);
  border-radius: var(--radius-card);
  overflow: hidden;
  border: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: 0.2s;
}

.playlist-grid .playlist-card:hover {
  border-color: var(--accent);
  transform: scale(1.02);
}

.playlist-grid .playlist-card .cover {
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
  background: var(--bg-card-hover);
}

.playlist-grid .playlist-card .cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.playlist-grid .playlist-card .info {
  padding: 10px 12px 12px;
}

.playlist-grid .playlist-card .info .name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.playlist-grid .playlist-card .info .count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== FULL PLAYER OVERLAY ===== */
.full-player-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg-primary);
  z-index: 200;
  display: none;
  flex-direction: column;
  padding: 20px;
  animation: slideUp 0.3s ease;
}

.full-player-overlay.active {
  display: flex;
}

.full-player-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 28px;
  padding: 8px;
  align-self: flex-start;
  cursor: pointer;
  margin-bottom: 20px;
}

.full-player-artwork {
  width: 100%;
  max-width: 340px;
  aspect-ratio: 1/1;
  border-radius: 16px;
  overflow: hidden;
  background: #1a1a2e;
  margin: 0 auto 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

.full-player-artwork img,
.full-player-artwork video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.full-player-info {
  text-align: center;
  margin-bottom: 16px;
}

.full-player-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}

.full-player-artist {
  font-size: 16px;
  color: var(--text-muted);
}

.full-player-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  margin-bottom: 24px;
}

.full-player-progress input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.15);
  outline: none;
  transition: 0.2s;
}

.full-player-progress input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
}

.full-player-time {
  font-size: 12px;
  color: var(--text-muted);
  min-width: 40px;
}

.full-player-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 32px;
  margin-bottom: 32px;
}

.full-player-controls button {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 32px;
  cursor: pointer;
  transition: 0.2s;
  padding: 8px;
  border-radius: 50%;
}

.full-player-controls button:hover {
  color: var(--text-primary);
}

.full-player-controls #fullPlayerPlay {
  width: 72px;
  height: 72px;
  font-size: 36px;
  background: var(--gradient-1);
  color: #fff;
  border-radius: 50%;
  box-shadow: 0 8px 32px rgba(220, 38, 38, 0.3);
}

.full-player-actions {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);
}

.full-player-actions button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 28px;
  cursor: pointer;
  transition: 0.2s;
  padding: 8px;
}

.full-player-actions button:hover {
  color: var(--text-primary);
}

.full-player-actions .liked {
  color: #22c55e;
}

/* Only show on mobile */
@media (min-width: 769px) {
  .full-player-overlay {
    display: none !important;
  }
}

/* Hide scrollbar for horizontal scrolling */
.playlist-series-scroll::-webkit-scrollbar {
  display: none;
}
.playlist-series-scroll {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

/* ===== LOADING OVERLAY ===== */
.loading-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 16px;
}
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ===== VOLUME CONTROL ===== */
.volume-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 4px;
  width: 100%;
}
.volume-row i {
  color: var(--text-muted);
  font-size: 13px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}
.volume-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  border-radius: 3px;
  background: rgba(255,255,255,0.15);
  outline: none;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text-secondary);
  cursor: pointer;
}
.volume-slider::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text-secondary);
  cursor: pointer;
  border: none;
}

/* ===== MOBILE RESPONSIVENESS ===== */

/* Very small screens (< 380px) */
@media (max-width: 380px) {
  .header-right button { font-size: 18px; padding: 4px 6px; }
  .tab-nav button { font-size: 13px; padding: 6px 10px; }
  .beat-card-title { font-size: 13px; }
  .beat-card-actions button { padding: 4px 6px; font-size: 12px; }
  .spotify-player { padding: 8px 12px 12px; }
  #playerPlay { width: 52px !important; height: 52px !important; font-size: 24px !important; }
  #playerPrev, #playerNext { font-size: 22px !important; }
  #playerArtwork { width: 46px !important; height: 46px !important; }
  #playerTitle { font-size: 12px !important; }
  #playerArtist { font-size: 11px !important; }
}

/* Full player overlay — fit on all screen sizes */
.full-player-overlay {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.full-player-content {
  display: flex;
  flex-direction: column;
  min-height: 100%;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}
.full-player-artwork {
  max-width: min(340px, calc(100vw - 48px));
}

/* Prevent layout shift on very short screens */
@media (max-height: 600px) {
  .full-player-artwork {
    max-width: 200px;
    margin-bottom: 12px;
  }
  .full-player-info { margin-bottom: 8px; }
  .full-player-progress { margin-bottom: 12px; }
  .full-player-controls { gap: 20px; margin-bottom: 16px; }
  .full-player-controls #fullPlayerPlay { width: 56px; height: 56px; font-size: 28px; }
}

/* ===== ACCESSIBILITY ===== */

/* Keyboard focus styles — show a clear outline when navigating by keyboard.
   :focus-visible is supported by all modern browsers and avoids the annoying
   mouse-click outline without hiding it from keyboard users. */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}
:focus:not(:focus-visible) {
  outline: none;
}
input[type="range"]:focus-visible {
  outline-offset: 4px;
}

/* ===== MINIMUM TAP TARGETS (mobile) =====
   WCAG 2.5.8 recommends 24×24px minimum, Apple HIG suggests 44×44px.
   We only enforce this on coarse-pointer (touch) devices so it doesn't
   change the layout on desktop. */
@media (hover: none) and (pointer: coarse) {
  .beat-card-actions button,
  .track-actions button,
  .header-right button,
  .full-player-actions button {
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
}

/* ===== CART ADD ANIMATION ===== */
@keyframes cartBounce {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.5) rotate(-10deg); }
  60%  { transform: scale(0.9) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.cart-add-animation {
  animation: cartBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ===== LIKED STATE STYLES (universal) ===== */
.like-sm.liked,
.like-btn-track.liked {
  color: var(--like-color-active);
}
.like-sm,
.like-btn-track {
  transition: color 0.2s, transform 0.15s;
}
.like-sm:active,
.like-btn-track:active {
  transform: scale(1.3);
}

/* ===== VOLUME SLIDER — LARGER TOUCH THUMB ON MOBILE ===== */
@media (hover: none) and (pointer: coarse) {
  .volume-slider {
    height: 4px;
  }
  .volume-slider::-webkit-slider-thumb {
    width: 22px;
    height: 22px;
  }
  .volume-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
  }
  /* Volume row hidden when programmatic control is unsupported */
  .volume-row.ios-volume-hidden {
    display: none;
  }
  /* Bottom player spacing on mobile */
  .spotify-player {
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
}

/* Mute toggle button shown when slider is unavailable */
.mute-toggle-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 50%;
  transition: color 0.2s;
}
.mute-toggle-btn.muted {
  color: var(--accent);
}
/* ===== DESKTOP SIDEBAR ===== */
.desktop-sidebar {
  display: none;
}

.sidebar-header {
  padding: 24px 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.sidebar-brand {
  appearance: none;
  background: none;
  border: 0;
  padding: 0;
  cursor: pointer;
  transition: opacity 0.2s;
  display: inline-flex;
  align-items: center;
}

.sidebar-brand:hover { opacity: 0.8; }

.sidebar-brand img {
  height: 28px;
  width: auto;
  display: block;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  padding: 11px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  border-radius: 8px;
  position: relative;
  white-space: nowrap;
}

.sidebar-nav-btn i {
  font-size: 17px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-nav-btn.active {
  color: var(--accent);
  background: var(--accent-subtle);
}

.sidebar-nav-btn:hover:not(.active) {
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.04);
}

.sidebar-footer {
  padding: 12px 8px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}

.sidebar-badge {
  background: var(--accent);
  color: white;
  border-radius: 12px;
  padding: 1px 7px;
  font-size: 11px;
  font-weight: 700;
  margin-left: auto;
  align-items: center;
  display: none; /* shown via JS when cart has items */
}

/* ===== MOBILE BOTTOM NAVIGATION ===== */
.mobile-bottom-nav {
  display: none;
}

/* ===== BEAT CARD PLAY OVERLAY ===== */
.beat-card-play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.45);
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

.beat-card-play-overlay i {
  font-size: 36px;
  color: white;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
  transform: scale(0.85);
  transition: transform 0.2s;
}

/* Show overlay on hover (pointer devices only) */
@media (hover: hover) {
  .beat-card:hover .beat-card-play-overlay {
    opacity: 1;
  }
  .beat-card:hover .beat-card-play-overlay i {
    transform: scale(1);
  }
}

/* ===== BEAT CARD — TABLET GRID (600–1023px) ===== */
@media (min-width: 600px) and (max-width: 1023px) {
  .tab-nav { display: none !important; }

  .beat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .beat-card {
    flex-direction: column;
    align-items: stretch;
    padding: 0;
    border-radius: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    overflow: hidden;
  }

  .beat-card:hover {
    border-color: var(--accent-border);
    background: var(--bg-card-hover);
  }

  .beat-card-art {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    border-radius: 0;
    overflow: hidden;
  }

  .beat-card-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .beat-card:hover .beat-card-art img { transform: scale(1.04); }

  .beat-card-info { padding: 10px 12px 0; }
  .beat-card-actions { padding: 6px 12px 10px; }
}

/* ===== DESKTOP LAYOUT (1024px+) ===== */
@media (min-width: 1024px) {
  /* Remove mobile nav bar */
  .mobile-bottom-nav { display: none; }

  /* Show sidebar */
  .desktop-sidebar {
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-subtle);
    z-index: 100;
    overflow: hidden;
  }

  /* Push app content to the right of sidebar */
  .app {
    max-width: calc(100% - var(--sidebar-width)) !important;
    margin-left: var(--sidebar-width) !important;
    margin-right: 0 !important;
    width: calc(100% - var(--sidebar-width)) !important;
    box-shadow: none !important;
  }

  /* Hide original top tab nav */
  .tab-nav { display: none !important; }

  /* Hide brand from header (it lives in sidebar) */
  .header-spacer { display: none; }

  /* Expand header padding */
  .header { padding: 12px 24px; }

  /* Remove tab-content inner padding (grid handles its own) */
  .tab-content { padding: 0; }

  /* Beat grid: 3 columns */
  .beat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 16px 20px;
  }

  /* Card style */
  .beat-card {
    flex-direction: column;
    align-items: stretch;
    padding: 0;
    border-radius: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }

  .beat-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent-border);
    box-shadow: var(--shadow-hover);
  }

  .beat-card-art {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    border-radius: 0;
    overflow: hidden;
  }

  .beat-card-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .beat-card:hover .beat-card-art img { transform: scale(1.04); }

  .beat-card-info { padding: 12px 14px 4px; }

  .beat-card-title { font-size: 15px; font-weight: 600; }

  .beat-card-artist { font-size: 12px; margin-top: 2px; }

  .beat-card-actions { padding: 8px 14px 12px; gap: 6px; }

  .beat-card-actions button { font-size: 15px; padding: 7px 9px; }

  /* Beat Store search bar inset */
  .beatstore-search {
    margin: 16px 20px 0 !important;
  }

  /* Playlist grid: 3 cols */
  #beatTapesGrid > .playlist-grid,
  .playlist-grid {
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 16px !important;
  }

  #beatTapesGrid {
    padding: 16px 20px;
  }

  /* Playlist card hover */
  .playlist-card {
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s !important;
  }
